<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑名单查询</title>
	<link rel="stylesheet" href="./css/style.css">
	<link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<!-- 维护 -->
<script src="./js/userkey.js"></script>
	
    <div class="container">
        <h1>黑名单查询</h1>
        <div class="input-container">
            <input type="text" id="queryInput" onkeydown="if (event.key === 'Enter') checkBlacklist()">
            <span class="clear-icon" onclick="clearInput()">X</span>
        </div>
        <button onclick="checkBlacklist()">查询</button>
        <div id="result"></div>
    </div>
    <footer>黑名单来自各避雷群，不承担任何责任</footer>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="modalMessage"></p>
        </div>
    </div>

    <script src="blacklist.js"></script>
	<script src="./js/main.js"></script>
</body>
</html>
